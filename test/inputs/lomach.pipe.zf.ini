[solver]
type = loMach

[loMach]
axisymmetric = true
mesh = meshes/axi-pipe-wall-rm2.msh
ref_levels = 0
order = 1
#order = 3
maxIters = 20200
#outputFreq = 1000
outputFreq = 200
timingFreq = 10
flow-solver = tomboulides
thermo-solver = constant-property
constprop/rho = 1.0
constprop/mu = 1e-4
turb-model = zeta-f

[ransModel]
#tke-ic = 1.0e-5
#tdr-ic = 1.0e-6
tke-min = 1.0e-7
tdr-min = 1.0e-9
v2-min = 1.0e-7
#tts-max = 1.0e2
tts-max = 1.0e4
tls-max = 1.0e2
#tls-max = 1.0e0
#tls-min = 1.0e-4
#tts-min = 1.0e-4
#mut-min = 1.0e-7
destruction = 1.0
zeta-f-file = inlet_turb_k_v2_2.csv
#destruction = 0.0

#[ransModel]
#tke-ic = 1.0e-5
#tdr-ic = 1.0e-6
#tke-min = 1.0e-7
#tdr-min = 1.0e-10 # Diameter = 2 
#v2-min = 1.0e-7
##tke-min = 1.0e-5
##tdr-min = 1.0e-8 # Diameter = 2 
##v2-min = 1.0e-5
#tts-max = 1.0e0
#tls-max = 2.0e0
##tls-min = 1.0e-4
##tts-min = 1.0e-4
##mut-min = 1.0e-7
#destruction = 1.0
##zfp-max = 1.

[loMach/tomboulides]
numerical-integ = false
streamwise-stabilization = false

[io]
outdirBase = output-pipe-zeta-f
enableRestart = True
#restartMode = singleFileRead
restartMode = variableP

# Set bdfOrder = 1 for restart testing purposes
[time]
enableConstantTimestep = True
cfl = 0.5
dtFactor = 0.01
#dt_fixed = 8.3e-4
#dt_fixed = 2e-4
dt_fixed = 1e-3
#dt_fixed = 0.0001
integrator = curlcurl
bdfOrder = 3
maxSolverIteration = 200
solverRelTolerance = 1.0e-12

[boundaryConditions]
numWalls = 1 #2
numInlets = 1
numOutlets = 0

[boundaryConditions/wall1]
patch = 5
type = viscous
velocity = '0.0 0.0'

# [boundaryConditions/wall2]
# patch = 2
# type = viscous
# velocity = '0.0 0.0'

[boundaryConditions/inlet1]
patch = 3
type = fully-developed-pipe-swirl
#tke = 0.00001
#tke = 0.0001
#tke = 1.0

#[boundaryConditions/outlet1]
#patch = 4
#type = uniform
#pressure = 0.0

[gpu]
hipStackSizeMult = 8